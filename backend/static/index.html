<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trad-ding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }

    /* Panel slide */
    .panel-enter { transform: translateX(100%); }
    .panel-open  { transform: translateX(0);    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .panel-close { transform: translateX(100%); transition: transform 0.2s  cubic-bezier(0.4, 0, 1,   1); }

    /* Overlay fade */
    .overlay-visible { opacity: 1; transition: opacity 0.2s ease; }
    .overlay-hidden  { opacity: 0; transition: opacity 0.2s ease; }

    /* Card type accent — top border */
    .card-stock  { border-top: 2px solid rgba(59, 130, 246, 0.45); }
    .card-crypto { border-top: 2px solid rgba(249, 115, 22, 0.45); }
    .card-etf    { border-top: 2px solid rgba(34, 197, 94, 0.45);  }

    /* Card hover — glow by type */
    .card-stock:hover  { box-shadow: 0 0 0 1px rgba(59,130,246,0.25), 0 4px 20px rgba(59,130,246,0.08); }
    .card-crypto:hover { box-shadow: 0 0 0 1px rgba(249,115,22,0.25), 0 4px 20px rgba(249,115,22,0.08); }
    .card-etf:hover    { box-shadow: 0 0 0 1px rgba(34,197,94,0.25),  0 4px 20px rgba(34,197,94,0.08);  }

    /* Filter tab */
    .filter-tab { transition: background 0.15s, color 0.15s; }
    .filter-tab.active { background: rgba(99,102,241,0.15); color: #a5b4fc; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

    /* Focus ring */
    :focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* News card stagger entrance */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .news-card {
      opacity: 0;
      animation: fadeSlideUp 0.22s ease-out forwards;
    }

    /* Text clamping */
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* Toast */
    @keyframes toastIn  { from { opacity:0; transform:translateY(8px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0) scale(1); }    to { opacity:0; transform:translateY(4px) scale(.97); } }
    .toast-enter { animation: toastIn  0.22s cubic-bezier(0.4,0,0.2,1) forwards; }
    .toast-exit  { animation: toastOut 0.18s cubic-bezier(0.4,0,1,1)   forwards; }

    /* Signal pill */
    .signal-pill { transition: background 0.2s, color 0.2s; }
    .signal-pill:hover { filter: brightness(1.15); }

    /* Search clear button */
    #search-clear { transition: opacity 0.15s; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-10 bg-gray-950/90 backdrop-blur border-b border-gray-800 px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-2.5">
      <svg class="w-6 h-6 text-indigo-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
      <span class="text-base font-semibold tracking-tight">trad-ding</span>
    </div>

    <div class="flex items-center gap-2">
      <!-- Secondary actions dropdown -->
      <div class="relative" id="actions-menu-container">
        <button type="button" id="actions-menu-btn" onclick="toggleActionsMenu()"
          aria-haspopup="true" aria-expanded="false" aria-label="More actions"
          class="cursor-pointer flex items-center gap-1.5 min-h-[44px] text-sm bg-gray-800 hover:bg-gray-700 active:bg-gray-600 px-3 py-2 rounded-lg transition-colors duration-150 font-medium focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 focus-visible:ring-offset-gray-950">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
          </svg>
          <span class="hidden sm:inline">Actions</span>
        </button>

        <!-- Dropdown -->
        <div id="actions-dropdown"
          class="hidden absolute right-0 top-full mt-1.5 w-44 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl z-20 py-1 overflow-hidden"
          role="menu">
          <button type="button" onclick="syncNews(); closeActionsMenu()" id="sync-btn"
            class="cursor-pointer w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-200 hover:bg-gray-800 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed"
            role="menuitem">
            <svg class="w-4 h-4 text-gray-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Sync news
          </button>
          <button type="button" onclick="trainAll(); closeActionsMenu()" id="train-btn"
            class="cursor-pointer w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-200 hover:bg-gray-800 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed"
            role="menuitem">
            <svg class="w-4 h-4 text-gray-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
            Train all
          </button>
          <div class="mx-3 my-1 border-t border-gray-800"></div>
          <button type="button" onclick="analyzeAll(); closeActionsMenu()" id="analyze-all-btn"
            class="cursor-pointer w-full flex items-center gap-3 px-4 py-2.5 text-sm text-indigo-300 hover:bg-indigo-500/10 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed"
            role="menuitem">
            <svg class="w-4 h-4 text-indigo-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
            </svg>
            Analyze all
          </button>
        </div>
      </div>

      <button type="button" onclick="openCreateModal()"
        class="cursor-pointer min-h-[44px] text-sm bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 px-4 py-2 rounded-lg transition-colors duration-150 font-medium focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-2 focus-visible:ring-offset-gray-950 whitespace-nowrap">
        <span class="sm:hidden">+ Add</span>
        <span class="hidden sm:inline">+ Add asset</span>
      </button>
    </div>
  </header>

  <!-- ── Signal summary strip ────────────────────────────────────────────── -->
  <div id="signal-summary" class="hidden px-4 sm:px-6 pt-4 pb-1">
    <div class="flex items-center gap-2 flex-wrap">
      <span class="text-xs text-gray-600 font-medium mr-1">Portfolio signals</span>
      <button type="button" onclick="setFilter('all'); setSignalFilter(null)"
        id="sig-buy" class="signal-pill hidden items-center gap-1.5 text-xs font-semibold px-3 py-1 min-h-[32px] rounded-full bg-green-500/12 text-green-400 border border-green-500/20 cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="sig-buy-label">BUY 0</span>
      </button>
      <button type="button" onclick="setFilter('all'); setSignalFilter(null)"
        id="sig-sell" class="signal-pill hidden items-center gap-1.5 text-xs font-semibold px-3 py-1 min-h-[32px] rounded-full bg-red-500/12 text-red-400 border border-red-500/20 cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        <span id="sig-sell-label">SELL 0</span>
      </button>
      <button type="button" onclick="setFilter('all'); setSignalFilter(null)"
        id="sig-hold" class="signal-pill hidden items-center gap-1.5 text-xs font-semibold px-3 py-1 min-h-[32px] rounded-full bg-yellow-500/12 text-yellow-400 border border-yellow-500/20 cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-yellow-500">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="sig-hold-label">HOLD 0</span>
      </button>
      <span id="sig-unanalyzed" class="hidden text-xs text-gray-600 tabular-nums"></span>
    </div>
  </div>

  <!-- ── Filter bar + search + sort ───────────────────────────────────────── -->
  <div class="px-4 sm:px-6 pt-4 pb-3 flex flex-col gap-3">
    <!-- Type filter tabs -->
    <div class="flex items-center gap-2 flex-wrap">
      <button type="button" data-filter="all" onclick="setFilter('all')"
        class="filter-tab active cursor-pointer text-xs font-medium px-3 py-2 min-h-[36px] rounded-lg text-gray-400 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        All <span id="count-all" class="ml-1 opacity-60"></span>
      </button>
      <button type="button" data-filter="stock" onclick="setFilter('stock')"
        class="filter-tab cursor-pointer text-xs font-medium px-3 py-2 min-h-[36px] rounded-lg text-gray-400 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-400 mr-1.5 align-middle"></span>
        Stock <span id="count-stock" class="ml-1 opacity-60"></span>
      </button>
      <button type="button" data-filter="crypto" onclick="setFilter('crypto')"
        class="filter-tab cursor-pointer text-xs font-medium px-3 py-2 min-h-[36px] rounded-lg text-gray-400 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-orange-400 mr-1.5 align-middle"></span>
        Crypto <span id="count-crypto" class="ml-1 opacity-60"></span>
      </button>
      <button type="button" data-filter="etf" onclick="setFilter('etf')"
        class="filter-tab cursor-pointer text-xs font-medium px-3 py-2 min-h-[36px] rounded-lg text-gray-400 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-green-400 mr-1.5 align-middle"></span>
        ETF <span id="count-etf" class="ml-1 opacity-60"></span>
      </button>
    </div>

    <!-- Search + sort row -->
    <div class="flex items-center gap-2">
      <!-- Search -->
      <div class="relative flex-1 sm:max-w-xs">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-600 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="search" placeholder="Search symbol or name…"
          oninput="onSearch(this.value)"
          class="w-full min-h-[44px] bg-gray-900 border border-gray-800 hover:border-gray-700 focus:border-indigo-500 text-sm text-gray-200 placeholder-gray-600 pl-8 pr-8 py-2 rounded-lg transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
          aria-label="Search assets" autocomplete="off" spellcheck="false" />
        <button id="search-clear" type="button" onclick="clearSearch()"
          class="absolute right-2.5 top-1/2 -translate-y-1/2 opacity-0 pointer-events-none text-gray-600 hover:text-gray-300 transition-colors"
          aria-label="Clear search">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Sort -->
      <div class="relative" id="sort-menu-container">
        <button type="button" id="sort-btn" onclick="toggleSortMenu()"
          aria-haspopup="true" aria-expanded="false"
          class="cursor-pointer flex items-center gap-1.5 min-h-[44px] text-xs font-medium px-3 py-2 bg-gray-900 border border-gray-800 hover:border-gray-700 text-gray-400 hover:text-white rounded-lg transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span id="sort-label">Sort</span>
        </button>
        <div id="sort-dropdown"
          class="hidden absolute right-0 top-full mt-1.5 w-44 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl z-20 py-1 overflow-hidden"
          role="menu">
          <button type="button" onclick="applySort('default')" role="menuitem"
            class="cursor-pointer w-full flex items-center gap-2.5 px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors duration-150" data-sort="default">
            <svg class="w-3.5 h-3.5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Default
          </button>
          <button type="button" onclick="applySort('symbol')" role="menuitem"
            class="cursor-pointer w-full flex items-center gap-2.5 px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors duration-150" data-sort="symbol">
            <svg class="w-3.5 h-3.5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="14" y2="15"/><polyline points="9 4 4 9 9 14"/></svg>
            Symbol A → Z
          </button>
          <button type="button" onclick="applySort('analyzed')" role="menuitem"
            class="cursor-pointer w-full flex items-center gap-2.5 px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors duration-150" data-sort="analyzed">
            <svg class="w-3.5 h-3.5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Last analyzed
          </button>
          <button type="button" onclick="applySort('action')" role="menuitem"
            class="cursor-pointer w-full flex items-center gap-2.5 px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors duration-150" data-sort="action">
            <svg class="w-3.5 h-3.5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>
            Signal (BUY first)
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Asset grid ───────────────────────────────────────────────────────── -->
  <main class="px-4 sm:px-6 pb-6">
    <div id="assets-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <!-- Skeletons on initial load -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 flex flex-col gap-4 animate-pulse">
        <div class="space-y-2"><div class="h-5 w-16 bg-gray-800 rounded"/><div class="h-3.5 w-28 bg-gray-800 rounded"/></div>
        <div class="flex gap-2 mt-auto"><div class="h-9 flex-1 bg-gray-800 rounded-lg"/><div class="h-9 flex-1 bg-gray-800 rounded-lg"/></div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 flex flex-col gap-4 animate-pulse">
        <div class="space-y-2"><div class="h-5 w-20 bg-gray-800 rounded"/><div class="h-3.5 w-32 bg-gray-800 rounded"/></div>
        <div class="flex gap-2 mt-auto"><div class="h-9 flex-1 bg-gray-800 rounded-lg"/><div class="h-9 flex-1 bg-gray-800 rounded-lg"/></div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 flex flex-col gap-4 animate-pulse hidden sm:flex">
        <div class="space-y-2"><div class="h-5 w-14 bg-gray-800 rounded"/><div class="h-3.5 w-24 bg-gray-800 rounded"/></div>
        <div class="flex gap-2 mt-auto"><div class="h-9 flex-1 bg-gray-800 rounded-lg"/><div class="h-9 flex-1 bg-gray-800 rounded-lg"/></div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 flex flex-col gap-4 animate-pulse hidden lg:flex">
        <div class="space-y-2"><div class="h-5 w-18 bg-gray-800 rounded"/><div class="h-3.5 w-28 bg-gray-800 rounded"/></div>
        <div class="flex gap-2 mt-auto"><div class="h-9 flex-1 bg-gray-800 rounded-lg"/><div class="h-9 flex-1 bg-gray-800 rounded-lg"/></div>
      </div>
    </div>
  </main>

  <!-- ── Full-screen loader ───────────────────────────────────────────────── -->
  <div id="page-loader" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-3" role="status" aria-live="polite">
    <svg class="animate-spin h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" aria-hidden="true">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <p id="loader-message" class="text-sm text-gray-300 font-medium"></p>
  </div>

  <!-- ── Create asset modal ──────────────────────────────────────────────── -->
  <div id="create-modal" onclick="handleModalBackdrop(event)"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-40 flex items-end sm:items-center justify-center p-0 sm:p-4"
    role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="bg-gray-900 border border-gray-800 rounded-t-2xl sm:rounded-2xl w-full max-w-md p-5 sm:p-6 space-y-5 shadow-2xl">

      <div class="flex items-center justify-between">
        <h2 id="modal-title" class="text-base font-semibold">Add asset</h2>
        <button type="button" onclick="closeCreateModal()" aria-label="Close dialog"
          class="cursor-pointer flex items-center justify-center w-8 h-8 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label for="f-name" class="text-sm font-medium text-gray-300 block mb-1.5">Name</label>
          <input id="f-name" type="text" placeholder="e.g. Apple Inc." autocomplete="off"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors duration-150" />
        </div>
        <div>
          <label for="f-symbol" class="text-sm font-medium text-gray-300 block mb-1.5">Symbol</label>
          <input id="f-symbol" type="text" placeholder="e.g. AAPL" autocomplete="off"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 uppercase focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors duration-150" />
        </div>
        <div>
          <label for="f-yfinance" class="text-sm font-medium text-gray-300 block mb-1.5">Yahoo Finance symbol</label>
          <input id="f-yfinance" type="text" placeholder="e.g. AAPL (or BTC-USD for crypto)" autocomplete="off"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors duration-150" />
          <p class="text-xs text-gray-500 mt-1.5">Will be validated against Yahoo Finance.</p>
        </div>
        <div>
          <label for="f-type" class="text-sm font-medium text-gray-300 block mb-1.5">Type</label>
          <select id="f-type"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors duration-150 cursor-pointer">
            <option value="stock">Stock</option>
            <option value="crypto">Crypto</option>
            <option value="etf">ETF</option>
          </select>
        </div>
      </div>

      <div id="create-error" role="alert" class="hidden items-center gap-1.5 text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="create-error-text"></span>
      </div>

      <div class="flex gap-3 pt-1">
        <button type="button" onclick="closeCreateModal()"
          class="cursor-pointer flex-1 min-h-[44px] bg-gray-800 hover:bg-gray-700 active:bg-gray-600 text-sm font-medium py-2.5 rounded-xl transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-500">
          Cancel
        </button>
        <button type="button" onclick="submitCreateAsset()" id="create-btn"
          class="cursor-pointer flex-1 min-h-[44px] bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-sm font-medium py-2.5 rounded-xl transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 disabled:opacity-50 disabled:cursor-not-allowed">
          Create
        </button>
      </div>
    </div>
  </div>

  <!-- ── Side panel overlay ──────────────────────────────────────────────── -->
  <div id="overlay" onclick="closePanel()"
    class="hidden fixed inset-0 bg-black/50 z-20 overlay-hidden" aria-hidden="true"></div>

  <!-- ── Side panel ──────────────────────────────────────────────────────── -->
  <div id="panel" role="complementary"
    class="panel-enter fixed top-0 right-0 h-full w-full max-w-lg bg-gray-900 border-l border-gray-800 z-30 flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 shrink-0">
      <span id="panel-title" class="font-semibold text-base"></span>
      <button type="button" onclick="closePanel()" aria-label="Close panel"
        class="cursor-pointer flex items-center justify-center w-9 h-9 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 active:bg-gray-700 transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="panel-body" class="overflow-y-auto flex-1 px-6 py-5 space-y-5"></div>
  </div>

  <script>
    // ─── state ──────────────────────────────────────────────────────
    let allAssets    = [];
    let activeFilter = 'all';
    let searchQuery  = '';
    let sortBy       = 'default';
    let activeSignal = null; // null | 'BUY' | 'SELL' | 'HOLD'

    // ─── localStorage helpers ────────────────────────────────────────
    const LS_KEY = s => `td_analysis_${s}`;

    function saveAnalysis(symbol, action) {
      try { localStorage.setItem(LS_KEY(symbol), JSON.stringify({ action, ts: Date.now() })); } catch {}
    }

    function loadAnalysis(symbol) {
      try { return JSON.parse(localStorage.getItem(LS_KEY(symbol))); } catch { return null; }
    }

    function timeAgo(ts) {
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 60)    return `${diff}s ago`;
      if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    // ─── design tokens ───────────────────────────────────────────────
    const typeBadge = t => ({
      stock:  'bg-blue-500/15 text-blue-400',
      crypto: 'bg-orange-500/15 text-orange-400',
      etf:    'bg-green-500/15 text-green-400',
    }[t] ?? 'bg-gray-700 text-gray-300');

    const actionStyle = a => ({
      BUY:  { pill: 'bg-green-500/15 text-green-400 border border-green-500/30', score: 'text-green-400', badge: 'bg-green-500/15 text-green-400' },
      SELL: { pill: 'bg-red-500/15 text-red-400 border border-red-500/30',       score: 'text-red-400',   badge: 'bg-red-500/15 text-red-400'   },
      HOLD: { pill: 'bg-yellow-500/15 text-yellow-400 border border-yellow-500/30', score: 'text-yellow-400', badge: 'bg-yellow-500/15 text-yellow-400' },
    }[a] ?? { pill: 'bg-gray-700 text-gray-300 border border-gray-600', score: 'text-gray-400', badge: 'bg-gray-700 text-gray-300' });

    // ─── filter ──────────────────────────────────────────────────────
    function setFilter(type) {
      activeFilter = type;
      document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === type);
      });
      renderGrid();
    }

    function updateCounts(assets) {
      document.getElementById('count-all').textContent    = assets.length;
      document.getElementById('count-stock').textContent  = assets.filter(a => a.type === 'stock').length;
      document.getElementById('count-crypto').textContent = assets.filter(a => a.type === 'crypto').length;
      document.getElementById('count-etf').textContent    = assets.filter(a => a.type === 'etf').length;
    }

    // ─── actions menu ────────────────────────────────────────────────
    function toggleActionsMenu() {
      const dd = document.getElementById('actions-dropdown');
      const btn = document.getElementById('actions-menu-btn');
      const open = !dd.classList.contains('hidden');
      dd.classList.toggle('hidden', open);
      btn.setAttribute('aria-expanded', String(!open));
    }

    function closeActionsMenu() {
      document.getElementById('actions-dropdown').classList.add('hidden');
      document.getElementById('actions-menu-btn').setAttribute('aria-expanded', 'false');
    }

    document.addEventListener('click', e => {
      if (!document.getElementById('actions-menu-container').contains(e.target)) closeActionsMenu();
      if (!document.getElementById('sort-menu-container').contains(e.target)) closeSortMenu();
    });

    // ─── sort menu ───────────────────────────────────────────────────
    function toggleSortMenu() {
      const dd = document.getElementById('sort-dropdown');
      const btn = document.getElementById('sort-btn');
      const open = !dd.classList.contains('hidden');
      dd.classList.toggle('hidden', open);
      btn.setAttribute('aria-expanded', String(!open));
    }

    function closeSortMenu() {
      document.getElementById('sort-dropdown').classList.add('hidden');
      document.getElementById('sort-btn').setAttribute('aria-expanded', 'false');
    }

    function applySort(type) {
      sortBy = type;
      closeSortMenu();
      const labels = { default: 'Sort', symbol: 'A → Z', analyzed: 'Recent', action: 'Signal' };
      document.getElementById('sort-label').textContent = labels[type] ?? 'Sort';
      document.querySelectorAll('[data-sort]').forEach(btn => {
        btn.classList.toggle('text-indigo-400', btn.dataset.sort === type);
        btn.classList.toggle('text-gray-300', btn.dataset.sort !== type);
      });
      renderGrid();
    }

    // ─── search ──────────────────────────────────────────────────────
    function onSearch(val) {
      searchQuery = val.trim().toLowerCase();
      const clearBtn = document.getElementById('search-clear');
      clearBtn.style.opacity = searchQuery ? '1' : '0';
      clearBtn.style.pointerEvents = searchQuery ? 'auto' : 'none';
      renderGrid();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      onSearch('');
    }

    // ─── signal filter ───────────────────────────────────────────────
    function setSignalFilter(action) {
      activeSignal = action;
      renderGrid();
    }

    // ─── signal summary ──────────────────────────────────────────────
    function updateSignalSummary() {
      const counts = { BUY: 0, SELL: 0, HOLD: 0, unanalyzed: 0 };
      allAssets.forEach(a => {
        const prev = loadAnalysis(a.symbol);
        if (prev?.action) counts[prev.action] = (counts[prev.action] || 0) + 1;
        else counts.unanalyzed++;
      });

      const total = counts.BUY + counts.SELL + counts.HOLD;
      const strip = document.getElementById('signal-summary');
      if (!allAssets.length) { strip.classList.add('hidden'); return; }
      strip.classList.remove('hidden');

      const showPill = (id, labelId, count, action, label) => {
        const el = document.getElementById(id);
        if (count > 0) {
          el.classList.remove('hidden');
          el.classList.add('inline-flex');
          document.getElementById(labelId).textContent = `${label} ${count}`;
          el.onclick = () => { activeSignal = activeSignal === action ? null : action; renderGrid(); };
        } else {
          el.classList.add('hidden');
          el.classList.remove('inline-flex');
        }
      };

      showPill('sig-buy',  'sig-buy-label',  counts.BUY,  'BUY',  'BUY');
      showPill('sig-sell', 'sig-sell-label', counts.SELL, 'SELL', 'SELL');
      showPill('sig-hold', 'sig-hold-label', counts.HOLD, 'HOLD', 'HOLD');

      const unanalyzedEl = document.getElementById('sig-unanalyzed');
      if (counts.unanalyzed > 0) {
        unanalyzedEl.classList.remove('hidden');
        unanalyzedEl.textContent = `${counts.unanalyzed} not yet analyzed`;
      } else {
        unanalyzedEl.classList.add('hidden');
      }
    }

    // ─── toast ───────────────────────────────────────────────────────
    function showToast(message, type = 'info', duration = 4000) {
      const colors = {
        success: 'bg-green-500/15 border-green-500/30 text-green-300',
        error:   'bg-red-500/15   border-red-500/30   text-red-300',
        info:    'bg-gray-800     border-gray-700      text-gray-200',
        warning: 'bg-yellow-500/15 border-yellow-500/30 text-yellow-300',
      };
      const icons = {
        success: `<polyline points="20 6 9 17 4 12"/>`,
        error:   `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`,
        info:    `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`,
        warning: `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
      };

      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast-enter pointer-events-auto flex items-center gap-2.5 px-4 py-3 rounded-xl border text-sm font-medium shadow-xl w-full sm:max-w-xs ${colors[type] ?? colors.info}`;
      toast.setAttribute('role', 'status');
      toast.innerHTML = `
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">${icons[type] ?? icons.info}</svg>
        <span class="flex-1">${message}</span>
        <button type="button" onclick="this.parentElement.remove()" class="cursor-pointer shrink-0 opacity-60 hover:opacity-100 transition-opacity" aria-label="Dismiss">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      }, duration);
    }

    // ─── analyze all ─────────────────────────────────────────────────
    async function analyzeAll() {
      if (!allAssets.length) { showToast('No assets to analyze.', 'warning'); return; }
      const btn = document.getElementById('analyze-all-btn');
      btn.disabled = true;

      showToast(`Analyzing ${allAssets.length} assets… this may take a few minutes.`, 'info', 8000);

      let done = 0, failed = 0;
      for (const asset of allAssets) {
        try {
          const res  = await fetch(`/predictions/${asset.symbol}`);
          const data = await res.json();
          if (!res.ok) { failed++; continue; }
          saveAnalysis(asset.symbol, data.action);
          done++;
        } catch { failed++; }
      }

      renderGrid();
      updateSignalSummary();
      btn.disabled = false;

      if (failed === 0) {
        showToast(`All ${done} assets analyzed successfully.`, 'success');
      } else {
        showToast(`${done} analyzed · ${failed} failed`, failed === allAssets.length ? 'error' : 'warning');
      }
    }

    // ─── panel ───────────────────────────────────────────────────────
    function openPanel(title, html) {
      document.getElementById('panel-title').textContent = title;
      document.getElementById('panel-body').innerHTML = html;
      const overlay = document.getElementById('overlay');
      overlay.classList.remove('hidden', 'overlay-hidden');
      overlay.classList.add('overlay-visible');
      const p = document.getElementById('panel');
      p.classList.remove('panel-close');
      requestAnimationFrame(() => p.classList.add('panel-open'));
    }

    function closePanel() {
      const p = document.getElementById('panel');
      p.classList.remove('panel-open');
      p.classList.add('panel-close');
      const overlay = document.getElementById('overlay');
      overlay.classList.remove('overlay-visible');
      overlay.classList.add('overlay-hidden');
      setTimeout(() => overlay.classList.add('hidden'), 200);
    }

    function spinner() {
      return `<div class="flex items-center gap-2 text-gray-400 text-sm py-10 justify-center">
        <svg class="animate-spin h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg><span>Loading...</span>
      </div>`;
    }

    // ─── render grid ─────────────────────────────────────────────────
    function renderGrid() {
      const grid = document.getElementById('assets-grid');

      // 1. type filter
      let visible = activeFilter === 'all' ? [...allAssets] : allAssets.filter(a => a.type === activeFilter);

      // 2. signal filter
      if (activeSignal) {
        visible = visible.filter(a => {
          const prev = loadAnalysis(a.symbol);
          return prev?.action === activeSignal;
        });
      }

      // 3. search
      if (searchQuery) {
        visible = visible.filter(a =>
          a.symbol.toLowerCase().includes(searchQuery) ||
          (a.name || '').toLowerCase().includes(searchQuery)
        );
      }

      // 4. sort
      if (sortBy === 'symbol') {
        visible.sort((a, b) => a.symbol.localeCompare(b.symbol));
      } else if (sortBy === 'analyzed') {
        visible.sort((a, b) => {
          const ta = loadAnalysis(a.symbol)?.ts ?? 0;
          const tb = loadAnalysis(b.symbol)?.ts ?? 0;
          return tb - ta;
        });
      } else if (sortBy === 'action') {
        const order = { BUY: 0, HOLD: 1, SELL: 2, null: 3 };
        visible.sort((a, b) => {
          const aa = loadAnalysis(a.symbol)?.action ?? null;
          const ba = loadAnalysis(b.symbol)?.action ?? null;
          return (order[aa] ?? 3) - (order[ba] ?? 3);
        });
      }

      // update signal pill active states
      ['sig-buy', 'sig-sell', 'sig-hold'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const action = id.replace('sig-', '').toUpperCase();
        el.classList.toggle('ring-2', activeSignal === action);
        el.classList.toggle('ring-offset-gray-950', activeSignal === action);
      });

      if (!visible.length && allAssets.length > 0) {
        const msg = searchQuery
          ? `No assets matching "<strong>${searchQuery}</strong>"`
          : activeSignal
          ? `No ${activeSignal} signals right now`
          : `No ${activeFilter}s found.`;
        grid.innerHTML = `<div class="col-span-full flex flex-col items-center gap-2 py-16 text-center">
          <svg class="w-8 h-8 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p class="text-sm text-gray-500">${msg}</p>
          ${searchQuery ? `<button type="button" onclick="clearSearch()" class="cursor-pointer text-xs text-indigo-400 hover:text-indigo-300 underline mt-1">Clear search</button>` : ''}
        </div>`;
        return;
      }

      grid.innerHTML = visible.map(a => {
        const prev = loadAnalysis(a.symbol);
        const prevBadge = prev
          ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${actionStyle(prev.action).badge}">${prev.action} · ${timeAgo(prev.ts)}</span>`
          : '';

        return `
          <div class="card-${a.type} bg-gray-900 border border-gray-800/80 rounded-xl p-5 flex flex-col gap-3 transition-all duration-200 cursor-default">
            <div class="flex items-start justify-between gap-2">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xl font-bold tracking-tight">${a.symbol}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full font-medium ${typeBadge(a.type)}">${a.type.toUpperCase()}</span>
                </div>
                <p class="text-sm text-gray-400 leading-snug">${a.name}</p>
              </div>
              ${prevBadge ? `<div class="shrink-0 pt-0.5">${prevBadge}</div>` : ''}
            </div>

            <!-- Primary actions -->
            <div class="flex gap-2 mt-auto">
              <button type="button" onclick="analyze('${a.symbol}')"
                class="cursor-pointer flex-1 min-h-[40px] bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400">
                Analyze
              </button>
              <button type="button" onclick="showNews('${a.symbol}')"
                class="cursor-pointer flex-1 min-h-[40px] border border-gray-700 hover:border-gray-600 hover:bg-gray-800/60 text-gray-300 hover:text-white text-sm font-medium py-2 rounded-lg transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-500">
                News
              </button>
            </div>

            <!-- Destructive action — separated with border -->
            <div class="border-t border-gray-800/80 pt-2.5 -mx-5 px-5 -mb-1">
              <button type="button" onclick="deleteAsset('${a.symbol}')"
                aria-label="Delete ${a.symbol}"
                class="cursor-pointer w-full flex items-center justify-center gap-2 min-h-[32px] text-xs font-medium text-gray-600 hover:text-red-400 hover:bg-red-500/10 rounded-lg px-3 py-1.5 transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500">
                <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
                Delete
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // ─── load assets ─────────────────────────────────────────────────
    async function loadAssets() {
      try {
        const res = await fetch('/summary');
        allAssets = await res.json();
        const grid = document.getElementById('assets-grid');

        if (!allAssets.length) {
          grid.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-20 gap-4 text-center">
              <div class="w-14 h-14 rounded-2xl bg-gray-900 border border-gray-800 flex items-center justify-center">
                <svg class="w-7 h-7 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                  <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
                </svg>
              </div>
              <div>
                <p class="text-white font-medium mb-1">No assets yet</p>
                <p class="text-gray-500 text-sm">Add your first stock, crypto, or ETF to get started.</p>
              </div>
              <button type="button" onclick="openCreateModal()"
                class="cursor-pointer min-h-[44px] bg-indigo-600 hover:bg-indigo-500 px-5 py-2.5 rounded-xl text-sm font-medium transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400">
                + Add your first asset
              </button>
            </div>`;
          return;
        }

        updateCounts(allAssets);
        updateSignalSummary();
        renderGrid();
      } catch {
        document.getElementById('assets-grid').innerHTML =
          `<p class="text-red-400 text-sm col-span-full">Failed to load assets. Is the server running?</p>`;
      }
    }

    // ─── analyze ─────────────────────────────────────────────────────
    async function analyze(symbol) {
      openPanel(`${symbol} — Analysis`, spinner() + `<p class="text-xs text-gray-500 text-center -mt-4">If no model exists, training will run first. This may take a few minutes.</p>`);
      try {
        const res = await fetch(`/predictions/${symbol}`);
        const d = await res.json();
        if (!res.ok) throw new Error(d.detail ?? 'Error');

        saveAnalysis(symbol, d.action);
        updateSignalSummary();
        renderGrid();

        const { pill, score: scoreColor } = actionStyle(d.action);
        const now = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        // Score bar: map -1..+1 to 0..100% width, midpoint at 50%
        const barPct   = Math.round(((parseFloat(d.score) + 1) / 2) * 100);
        const barColor = d.action === 'BUY' ? 'bg-green-500' : d.action === 'SELL' ? 'bg-red-500' : 'bg-yellow-500';

        // Color band per action
        const heroBg = d.action === 'BUY'  ? 'bg-green-500/8 border-green-500/20'
                     : d.action === 'SELL' ? 'bg-red-500/8 border-red-500/20'
                     :                       'bg-yellow-500/8 border-yellow-500/20';

        const sectionLabel = `<p class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-3 flex items-center gap-2">`;

        openPanel(`${symbol} — Analysis`, `
          <!-- Hero: action + score -->
          <div class="rounded-xl border ${heroBg} p-4 space-y-3">
            <div class="flex items-center gap-3">
              <span class="text-4xl font-bold tracking-tight ${scoreColor}">${d.action}</span>
              <span class="text-xs px-2.5 py-1 rounded-full font-medium ${pill}">${d.sentiment}</span>
              <span class="ml-auto text-2xl font-bold tabular-nums ${scoreColor}">${d.score > 0 ? '+' : ''}${d.score.toFixed(2)}</span>
            </div>

            <!-- Score bar -->
            <div>
              <div class="flex justify-between text-xs text-gray-600 mb-1.5">
                <span>−1.0 Bearish</span><span>Bullish +1.0</span>
              </div>
              <div class="relative h-1.5 bg-gray-800 rounded-full overflow-hidden">
                <div class="absolute inset-y-0 left-1/2 w-px bg-gray-700"></div>
                <div class="h-full ${barColor} rounded-full transition-all duration-500" style="width:${barPct}%"></div>
              </div>
            </div>

            <p class="text-xs text-gray-400 leading-relaxed">${d.score_interpretation}</p>
          </div>

          <!-- Timestamp -->
          <p class="text-xs text-gray-600 flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Analyzed ${now}
          </p>

          <hr class="border-gray-800"/>

          <!-- Summary -->
          <section class="space-y-2">
            ${sectionLabel}
              <span class="inline-block w-1 h-3.5 rounded-full bg-indigo-500/60"></span>Summary
            </p>
            <p class="text-sm text-gray-300 leading-[1.75] max-w-prose">${d.summary}</p>
          </section>

          <!-- Recommendation -->
          <section class="space-y-2">
            ${sectionLabel}
              <span class="inline-block w-1 h-3.5 rounded-full bg-indigo-500/60"></span>Recommendation
            </p>
            <p class="text-sm text-gray-300 leading-[1.75] max-w-prose">${d.recommendation}</p>
          </section>

          ${d.growth_signals?.length ? `
          <section class="space-y-2">
            ${sectionLabel}
              <span class="inline-block w-1 h-3.5 rounded-full bg-green-500/60"></span>Growth signals
            </p>
            <ul class="space-y-2">${d.growth_signals.map(s => `
              <li class="flex gap-2.5 text-sm text-green-400 leading-snug">
                <svg class="w-4 h-4 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                <span>${s}</span>
              </li>`).join('')}
            </ul>
          </section>` : ''}

          ${d.risks?.length ? `
          <section class="space-y-2">
            ${sectionLabel}
              <span class="inline-block w-1 h-3.5 rounded-full bg-red-500/60"></span>Risks
            </p>
            <ul class="space-y-2">${d.risks.map(r => `
              <li class="flex gap-2.5 text-sm text-red-400 leading-snug">
                <svg class="w-4 h-4 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                <span>${r}</span>
              </li>`).join('')}
            </ul>
          </section>` : ''}

          ${d.monitor?.length ? `
          <section class="space-y-2">
            ${sectionLabel}
              <span class="inline-block w-1 h-3.5 rounded-full bg-yellow-500/60"></span>Watch
            </p>
            <ul class="space-y-1.5">${d.monitor.map(m => `
              <li class="flex gap-2.5 text-sm text-gray-400 leading-snug">
                <svg class="w-4 h-4 shrink-0 mt-0.5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>${m}</span>
              </li>`).join('')}
            </ul>
          </section>` : ''}

          ${d.competitors_mentioned?.length ? `
          <section class="space-y-2">
            ${sectionLabel}
              <span class="inline-block w-1 h-3.5 rounded-full bg-gray-500/60"></span>Competitors mentioned
            </p>
            <div class="flex flex-wrap gap-2">${d.competitors_mentioned.map(c => `
              <span class="text-xs bg-gray-800 border border-gray-700 px-2.5 py-1 rounded-lg font-medium text-gray-300">${c}</span>`).join('')}
            </div>
          </section>` : ''}

          <!-- Re-analyze -->
          <div class="pt-2 border-t border-gray-800">
            <button type="button" onclick="analyze('${symbol}')"
              class="cursor-pointer w-full flex items-center justify-center gap-2 min-h-[40px] text-sm font-medium text-gray-400 hover:text-white border border-gray-700 hover:border-gray-600 hover:bg-gray-800/60 rounded-xl transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              Re-analyze
            </button>
          </div>
        `);
      } catch (e) {
        openPanel(`${symbol} — Analysis`, `
          <div class="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 border border-red-500/20 rounded-xl p-4">
            <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>${e.message}</span>
          </div>`);
      }
    }

    // ─── news ────────────────────────────────────────────────────────
    const NEWS_LIMIT = 5;

    // Parse raw pipe-delimited news string into structured fields
    function parseNewsRaw(raw) {
      const out = { title: '', date: '', source: '', summary: '', url: '' };
      if (!raw) return out;
      const segments = raw.split(' | ');
      segments.forEach(seg => {
        const ci = seg.indexOf(': ');
        if (ci === -1) return;
        const key = seg.substring(0, ci).trim().toLowerCase();
        const val = seg.substring(ci + 2).trim();
        if (key === 'title')   out.title   = val;
        else if (key === 'date')    out.date    = val;
        else if (key === 'source')  out.source  = val;
        else if (key === 'summary') out.summary = val;
        else if (key === 'url')     out.url     = val;
      });
      return out;
    }

    function fmtNewsDate(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return iso; }
    }

    function sourceColor(src) {
      const s = (src || '').toLowerCase();
      if (s.includes('yahoo') || s.includes('yfinance')) return 'bg-purple-500/15 text-purple-300 border-purple-500/25';
      if (s.includes('reuters'))  return 'bg-orange-500/15 text-orange-300 border-orange-500/25';
      if (s.includes('bloomberg')) return 'bg-blue-500/15 text-blue-300 border-blue-500/25';
      if (s.includes('cnbc'))     return 'bg-yellow-500/15 text-yellow-300 border-yellow-500/25';
      if (s.includes('wall st') || s.includes('wsj')) return 'bg-red-500/15 text-red-300 border-red-500/25';
      return 'bg-gray-700/60 text-gray-400 border-gray-600/40';
    }

    function buildNewsCard(item, idx) {
      const p  = parseNewsRaw(item.summary);
      const srcLabel = p.source || item.source_type || 'News';
      const date     = fmtNewsDate(p.date);
      const title    = p.title  || 'Untitled article';
      const summary  = p.summary || item.summary || '';
      const url      = p.url || '';
      const srcCls   = sourceColor(srcLabel + ' ' + (item.source_type || ''));

      const linkBtn = url
        ? `<a href="${url}" target="_blank" rel="noopener noreferrer"
              class="inline-flex items-center gap-1.5 text-xs font-medium text-indigo-400 hover:text-indigo-300 transition-colors duration-150"
              aria-label="Read full article: ${title.replace(/"/g, '&quot;')}">
              Read article
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
           </a>`
        : '';

      const animDelay = `style="animation-delay:${idx * 50}ms"`;

      return `
        <article ${animDelay} class="group news-card bg-gray-900 border border-gray-800 rounded-xl overflow-hidden hover:border-gray-700 transition-all duration-200 hover:shadow-lg hover:shadow-black/30">
          <!-- Card body -->
          <div class="p-4 space-y-3">
            <!-- Source + date row -->
            <div class="flex items-center gap-2 flex-wrap">
              <span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-md border ${srcCls}">
                <svg class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                ${srcLabel}
              </span>
              ${date ? `<span class="text-xs text-gray-600 tabular-nums">${date}</span>` : ''}
            </div>

            <!-- Title -->
            <h3 class="text-sm font-semibold text-gray-100 leading-snug group-hover:text-white transition-colors duration-150 line-clamp-2">${title}</h3>

            <!-- Summary -->
            ${summary ? `<p class="text-xs text-gray-400 leading-[1.7] line-clamp-3">${summary}</p>` : ''}
          </div>

          <!-- Footer -->
          ${url ? `
          <div class="px-4 pb-3 flex items-center justify-between border-t border-gray-800/70 pt-3">
            ${linkBtn}
            <span class="text-xs text-gray-700 uppercase tracking-widest">${(item.source_type || '').toUpperCase()}</span>
          </div>` : ''}
        </article>`;
    }

    async function showNews(symbol, offset = 0) {
      offset === 0 ? showLoader(`Loading news for ${symbol}...`) : (document.getElementById('panel-body').innerHTML = spinner());
      try {
        const res  = await fetch(`/news/${symbol}?offset=${offset}&limit=${NEWS_LIMIT}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail ?? 'Error');
        const items = data.news ?? [];

        if (!items.length && offset === 0) {
          hideLoader();
          openPanel(`${symbol} — News`, `
            <div class="flex flex-col items-center gap-3 py-10 text-center">
              <div class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center">
                <svg class="w-6 h-6 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></svg>
              </div>
              <p class="text-sm font-medium text-gray-300">No news yet for ${symbol}</p>
              <p class="text-xs text-gray-600 max-w-[220px]">Try syncing news from the Actions menu to fetch the latest articles.</p>
            </div>`);
          return;
        }

        const page = Math.floor(offset / NEWS_LIMIT) + 1;
        const header = `
          <div class="flex items-center justify-between pb-1">
            <p class="text-xs text-gray-600 tabular-nums">${items.length} article${items.length !== 1 ? 's' : ''} · page ${page}</p>
          </div>`;

        const cards = items.map((item, i) => buildNewsCard(item, i)).join('');

        const pagination = `
          <div class="flex items-center gap-2 pt-1">
            <button type="button" onclick="showNews('${symbol}', ${offset - NEWS_LIMIT})"
              class="cursor-pointer flex-1 min-h-[40px] flex items-center justify-center gap-1.5 text-sm font-medium rounded-xl border border-gray-800 hover:border-gray-700 hover:bg-gray-800/60 text-gray-400 hover:text-white transition-all duration-150 disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
              ${offset === 0 ? 'disabled aria-disabled="true"' : ''}>
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
              Prev
            </button>
            <button type="button" onclick="showNews('${symbol}', ${offset + NEWS_LIMIT})"
              class="cursor-pointer flex-1 min-h-[40px] flex items-center justify-center gap-1.5 text-sm font-medium rounded-xl border border-gray-800 hover:border-gray-700 hover:bg-gray-800/60 text-gray-400 hover:text-white transition-all duration-150 disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
              ${items.length < NEWS_LIMIT ? 'disabled aria-disabled="true"' : ''}>
              Next
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>`;

        hideLoader();
        openPanel(`${symbol} — News`, header + cards + pagination);
      } catch (e) {
        hideLoader();
        openPanel(`${symbol} — News`, `
          <div class="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 border border-red-500/20 rounded-xl p-4">
            <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>${e.message}</span>
          </div>`);
      }
    }

    // ─── sync news ───────────────────────────────────────────────────
    async function syncNews() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true;
      btn.textContent = 'Syncing...';
      showLoader('Syncing news...');
      try {
        const res  = await fetch('/news/sync');
        const data = await res.json();
        hideLoader();
        closePanel();
        showToast(data.message ?? 'News synced successfully.', 'success');
      } catch (e) {
        hideLoader();
        showToast(e.message ?? 'Failed to sync news.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-4 h-4 text-gray-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Sync news`;
      }
    }

    // ─── train all ───────────────────────────────────────────────────
    async function trainAll() {
      const btn = document.getElementById('train-btn');
      btn.disabled = true;
      btn.textContent = 'Training...';
      showLoader('Training all models...');
      try {
        const res  = await fetch('/train');
        const data = await res.json();
        const rows = data.results.map(r => `
          <div class="flex items-center justify-between py-2.5 border-b border-gray-800 last:border-0">
            <span class="text-sm font-medium">${r.symbol}</span>
            <span class="text-xs font-medium px-2.5 py-1 rounded-full ${r.error ? 'bg-red-500/15 text-red-400' : r.improved ? 'bg-green-500/15 text-green-400' : 'bg-gray-700 text-gray-400'}">
              ${r.error ? 'Error' : r.improved ? 'Improved' : 'No change'}
            </span>
          </div>`).join('');
        openPanel('Training results', `<div>${rows}</div>`);
      } catch (e) {
        openPanel('Training results', `
          <div class="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 border border-red-500/20 rounded-xl p-4">
            <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>${e.message}</span>
          </div>`);
      } finally {
        hideLoader();
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-4 h-4 text-gray-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Train all`;
      }
    }

    // ─── loader ──────────────────────────────────────────────────────
    function showLoader(message) {
      document.getElementById('loader-message').textContent = message;
      document.getElementById('page-loader').classList.remove('hidden');
    }

    function hideLoader() {
      document.getElementById('page-loader').classList.add('hidden');
    }

    // ─── delete ──────────────────────────────────────────────────────
    async function deleteAsset(symbol) {
      if (!confirm(`Delete ${symbol} and all its news and ML models?`)) return;
      showLoader(`Deleting ${symbol}...`);
      try {
        const res  = await fetch(`/assets/${symbol}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail ?? 'Error deleting asset.');
        try { localStorage.removeItem(LS_KEY(symbol)); } catch {}
        allAssets = allAssets.filter(a => a.symbol !== symbol);
        updateCounts(allAssets);
        updateSignalSummary();
        renderGrid();
        hideLoader();
        showToast(`${symbol} deleted.`, 'info');
      } catch (e) {
        hideLoader();
        showToast(e.message, 'error');
      }
    }

    // ─── create modal ─────────────────────────────────────────────────
    function openCreateModal() {
      ['f-name','f-symbol','f-yfinance'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-type').value = 'stock';
      document.getElementById('create-error').classList.add('hidden');
      document.getElementById('create-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('f-name').focus(), 50);
    }

    function closeCreateModal() {
      document.getElementById('create-modal').classList.add('hidden');
    }

    function handleModalBackdrop(e) {
      if (e.target === document.getElementById('create-modal')) closeCreateModal();
    }

    async function submitCreateAsset() {
      const btn     = document.getElementById('create-btn');
      const errEl   = document.getElementById('create-error');
      const errText = document.getElementById('create-error-text');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Validating...';

      const body = {
        name:            document.getElementById('f-name').value.trim(),
        symbol:          document.getElementById('f-symbol').value.trim().toUpperCase(),
        yfinance_symbol: document.getElementById('f-yfinance').value.trim(),
        asset_type:      document.getElementById('f-type').value,
      };

      if (!body.name || !body.symbol || !body.yfinance_symbol) {
        errText.textContent = 'All fields are required.';
        errEl.classList.remove('hidden');
        errEl.classList.add('flex');
        btn.disabled = false;
        btn.textContent = 'Create';
        return;
      }

      try {
        closeCreateModal();
        showLoader(`Creating ${body.symbol}...`);
        const res  = await fetch('/assets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail ?? 'Error creating asset.');
        await loadAssets();
        showToast(`${body.symbol} added to your portfolio.`, 'success');
      } catch (e) {
        openCreateModal();
        errText.textContent = e.message;
        errEl.classList.remove('hidden');
        errEl.classList.add('flex');
        showToast(e.message, 'error');
      } finally {
        hideLoader();
        btn.disabled = false;
        btn.textContent = 'Create';
      }
    }

    // ─── keyboard shortcuts ───────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closePanel(); closeCreateModal(); closeActionsMenu(); closeSortMenu(); }
      // '/' focuses search when no input is focused
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        document.getElementById('search-input')?.focus();
      }
    });

    loadAssets();
  </script>

  <!-- ── Toast container ─────────────────────────────────────────────────── -->
  <div id="toast-container" class="fixed bottom-3 left-3 right-3 sm:left-auto sm:right-5 sm:bottom-5 z-[200] flex flex-col gap-2 items-stretch sm:items-end pointer-events-none" aria-live="polite" aria-atomic="false"></div>
</body>
</html>
