<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trad-ding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .panel-enter { transform: translateX(100%); }
    .panel-open  { transform: translateX(0); transition: transform 0.3s ease; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-10 bg-gray-950/90 backdrop-blur border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <span class="text-lg font-bold tracking-tight">trad-ding</span>
    <div class="flex gap-2">
      <button onclick="syncNews()" id="sync-btn"
        class="text-sm bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg transition font-medium">
        Sync news
      </button>
      <button onclick="trainAll()" id="train-btn"
        class="text-sm bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg transition font-medium">
        Train all
      </button>
      <button onclick="openCreateModal()"
        class="text-sm bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-lg transition font-medium">
        + Add asset
      </button>
    </div>
  </header>

  <!-- Grid -->
  <main class="p-6">
    <div id="assets-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <div class="text-gray-500 text-sm col-span-full">Loading assets...</div>
    </div>
  </main>

  <!-- Full-screen loader -->
  <div id="page-loader" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-3">
    <svg class="animate-spin h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <p id="loader-message" class="text-sm text-gray-300"></p>
  </div>

  <!-- Create asset modal -->
  <div id="create-modal" onclick="handleModalBackdrop(event)"
    class="hidden fixed inset-0 bg-black/60 z-40 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-800 rounded-xl w-full max-w-md p-6 space-y-5">
      <h2 class="text-base font-semibold">Add asset</h2>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-400 block mb-1">Name</label>
          <input id="f-name" type="text" placeholder="e.g. Apple Inc."
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">Symbol</label>
          <input id="f-symbol" type="text" placeholder="e.g. AAPL"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 uppercase" />
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">Yahoo Finance symbol</label>
          <input id="f-yfinance" type="text" placeholder="e.g. AAPL (or BTC-USD for crypto)"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
          <p class="text-xs text-gray-500 mt-1">Will be validated against Yahoo Finance.</p>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">Type</label>
          <select id="f-type"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
            <option value="stock">Stock</option>
            <option value="crypto">Crypto</option>
            <option value="etf">ETF</option>
          </select>
        </div>
      </div>
      <p id="create-error" class="text-xs text-red-400 hidden"></p>
      <div class="flex gap-2 pt-1">
        <button onclick="closeCreateModal()"
          class="flex-1 bg-gray-800 hover:bg-gray-700 text-sm font-medium py-2 rounded-lg transition">
          Cancel
        </button>
        <button onclick="submitCreateAsset()" id="create-btn"
          class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-sm font-medium py-2 rounded-lg transition">
          Create
        </button>
      </div>
    </div>
  </div>

  <!-- Side panel overlay -->
  <div id="overlay" onclick="closePanel()"
    class="hidden fixed inset-0 bg-black/50 z-20"></div>

  <!-- Side panel -->
  <div id="panel"
    class="panel-enter fixed top-0 right-0 h-full w-full max-w-lg bg-gray-900 border-l border-gray-800 z-30 flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 shrink-0">
      <span id="panel-title" class="font-semibold text-base"></span>
      <button onclick="closePanel()" class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
    </div>
    <div id="panel-body" class="overflow-y-auto flex-1 px-6 py-5 space-y-5"></div>
  </div>

  <script>
    // ─── helpers ────────────────────────────────────────────────────
    const typeBadge = t => ({
      stock:  'bg-blue-500/15 text-blue-400',
      crypto: 'bg-orange-500/15 text-orange-400',
      etf:    'bg-green-500/15 text-green-400',
    }[t] ?? 'bg-gray-700 text-gray-300');

    const actionStyle = a => ({
      BUY:  { pill: 'bg-green-500/15 text-green-400 border border-green-500/30', dot: 'bg-green-400' },
      SELL: { pill: 'bg-red-500/15 text-red-400 border border-red-500/30',       dot: 'bg-red-400'   },
      HOLD: { pill: 'bg-yellow-500/15 text-yellow-400 border border-yellow-500/30', dot: 'bg-yellow-400' },
    }[a] ?? { pill: 'bg-gray-700 text-gray-300 border border-gray-600', dot: 'bg-gray-400' });

    function openPanel(title, html) {
      document.getElementById('panel-title').textContent = title;
      document.getElementById('panel-body').innerHTML = html;
      document.getElementById('overlay').classList.remove('hidden');
      const p = document.getElementById('panel');
      p.classList.remove('panel-open');
      requestAnimationFrame(() => p.classList.add('panel-open'));
    }

    function closePanel() {
      const p = document.getElementById('panel');
      p.classList.remove('panel-open');
      p.classList.add('panel-enter');
      document.getElementById('overlay').classList.add('hidden');
    }

    function spinner() {
      return `<div class="flex items-center gap-2 text-gray-400 text-sm py-8 justify-center">
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>Loading...
      </div>`;
    }

    // ─── load assets ────────────────────────────────────────────────
    async function loadAssets() {
      const res = await fetch('/summary');
      const assets = await res.json();
      const grid = document.getElementById('assets-grid');
      if (!assets.length) {
        grid.innerHTML = '<p class="text-gray-500 text-sm col-span-full">No assets found.</p>';
        return;
      }
      grid.innerHTML = assets.map(a => `
        <div class="bg-gray-900 border border-gray-800 hover:border-gray-700 rounded-xl p-5 flex flex-col gap-4 transition">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xl font-bold tracking-tight">${a.symbol}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${typeBadge(a.type)}">${a.type.toUpperCase()}</span>
            </div>
            <p class="text-sm text-gray-400">${a.name}</p>
          </div>
          <div class="flex gap-2 mt-auto">
            <button onclick="analyze('${a.symbol}')"
              class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 rounded-lg transition">
              Analyze
            </button>
            <button onclick="showNews('${a.symbol}')"
              class="flex-1 bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium py-2 rounded-lg transition">
              News
            </button>
            <button onclick="deleteAsset('${a.symbol}')"
              class="bg-gray-800 hover:bg-red-500/20 hover:text-red-400 text-gray-400 text-sm font-medium px-3 py-2 rounded-lg transition">
              &times;
            </button>
          </div>
        </div>
      `).join('');
    }

    // ─── analyze ────────────────────────────────────────────────────
    async function analyze(symbol) {
      openPanel(`${symbol} — Analysis`, spinner() + `<p class="text-xs text-gray-500 text-center -mt-3">If no model exists, training will run automatically. This may take a few minutes.</p>`);
      try {
        const res = await fetch(`/predictions/${symbol}`);
        const d = await res.json();
        if (!res.ok) throw new Error(d.detail ?? 'Error');
        const { pill } = actionStyle(d.action);
        const html = `
          <div class="flex items-center gap-3 pb-1">
            <span class="text-2xl font-bold">${d.action}</span>
            <span class="text-xs px-2.5 py-0.5 rounded-full font-medium ${pill}">${d.sentiment}</span>
            <span class="ml-auto text-lg font-semibold ${d.score >= 0 ? 'text-green-400' : 'text-red-400'}">${d.score > 0 ? '+' : ''}${d.score.toFixed(2)}</span>
          </div>
          <p class="text-xs text-gray-400">${d.score_interpretation}</p>

          <hr class="border-gray-800"/>

          <section>
            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Summary</p>
            <p class="text-sm text-gray-300 leading-relaxed">${d.summary}</p>
          </section>

          <section>
            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Recommendation</p>
            <p class="text-sm text-gray-300 leading-relaxed">${d.recommendation}</p>
          </section>

          ${d.growth_signals?.length ? `
          <section>
            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Growth signals</p>
            <ul class="space-y-1.5">
              ${d.growth_signals.map(s => `
                <li class="flex gap-2 text-sm text-green-400">
                  <span class="shrink-0 mt-0.5">+</span><span>${s}</span>
                </li>`).join('')}
            </ul>
          </section>` : ''}

          ${d.risks?.length ? `
          <section>
            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Risks</p>
            <ul class="space-y-1.5">
              ${d.risks.map(r => `
                <li class="flex gap-2 text-sm text-red-400">
                  <span class="shrink-0 mt-0.5">−</span><span>${r}</span>
                </li>`).join('')}
            </ul>
          </section>` : ''}

          ${d.monitor?.length ? `
          <section>
            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Watch</p>
            <ul class="space-y-1 list-disc list-inside text-sm text-gray-400">
              ${d.monitor.map(m => `<li>${m}</li>`).join('')}
            </ul>
          </section>` : ''}

          ${d.competitors_mentioned?.length ? `
          <section>
            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Competitors mentioned</p>
            <div class="flex flex-wrap gap-2">
              ${d.competitors_mentioned.map(c => `<span class="text-xs bg-gray-800 px-2 py-1 rounded">${c}</span>`).join('')}
            </div>
          </section>` : ''}
        `;
        openPanel(`${symbol} — Analysis`, html);
      } catch (e) {
        openPanel(`${symbol} — Analysis`, `<p class="text-red-400 text-sm">${e.message}</p>`);
      }
    }

    // ─── news ────────────────────────────────────────────────────────
    const NEWS_LIMIT = 5;

    async function showNews(symbol, offset = 0) {
      if (offset === 0) {
        showLoader(`Loading news for ${symbol}...`);
      } else {
        document.getElementById('panel-body').innerHTML = spinner();
      }
      try {
        const res = await fetch(`/news/${symbol}?offset=${offset}&limit=${NEWS_LIMIT}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail ?? 'Error');
        const items = data.news ?? [];
        if (!items.length && offset === 0) {
          hideLoader();
          openPanel(`${symbol} — News`, '<p class="text-gray-400 text-sm">No news available.</p>');
          return;
        }
        const cards = items.map(item => `
          <div class="bg-gray-800/60 rounded-xl p-4 space-y-2">
            <p class="text-sm text-gray-200 leading-relaxed">${item.summary}</p>
            <span class="text-xs text-gray-500 uppercase tracking-wider">${item.source_type}</span>
          </div>
        `).join('');

        const pagination = `
          <div class="flex items-center justify-between pt-2">
            <button onclick="showNews('${symbol}', ${offset - NEWS_LIMIT})"
              class="text-sm px-3 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 transition disabled:opacity-30 disabled:pointer-events-none"
              ${offset === 0 ? 'disabled' : ''}>
              &larr; Prev
            </button>
            <span class="text-xs text-gray-500">${offset + 1}–${offset + items.length}</span>
            <button onclick="showNews('${symbol}', ${offset + NEWS_LIMIT})"
              class="text-sm px-3 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 transition disabled:opacity-30 disabled:pointer-events-none"
              ${items.length < NEWS_LIMIT ? 'disabled' : ''}>
              Next &rarr;
            </button>
          </div>`;

        const html = cards + pagination;
        hideLoader();
        openPanel(`${symbol} — News`, html);
      } catch (e) {
        hideLoader();
        openPanel(`${symbol} — News`, `<p class="text-red-400 text-sm">${e.message}</p>`);
      }
    }

    // ─── sync news ──────────────────────────────────────────────────
    async function syncNews() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true;
      btn.textContent = 'Syncing...';
      showLoader('Syncing news...');
      try {
        const res = await fetch('/news/sync');
        const data = await res.json();
        openPanel('News sync', `<p class="text-sm text-gray-300">${data.message}</p>`);
      } catch (e) {
        openPanel('News sync', `<p class="text-red-400 text-sm">${e.message}</p>`);
      } finally {
        hideLoader();
        btn.disabled = false;
        btn.textContent = 'Sync news';
      }
    }

    // ─── train all ──────────────────────────────────────────────────
    async function trainAll() {
      const btn = document.getElementById('train-btn');
      btn.disabled = true;
      btn.textContent = 'Training...';
      showLoader('Training all models...');
      try {
        const res = await fetch('/train');
        const data = await res.json();
        const rows = data.results.map(r => `
          <div class="flex items-center justify-between text-sm py-1.5 border-b border-gray-800 last:border-0">
            <span class="font-medium">${r.symbol}</span>
            <span class="${r.improved ? 'text-green-400' : r.error ? 'text-red-400' : 'text-gray-400'}">
              ${r.error ? 'Error' : r.improved ? 'Improved' : 'No change'}
            </span>
          </div>
        `).join('');
        openPanel('Training results', `<div class="divide-y divide-gray-800">${rows}</div>`);
      } catch (e) {
        openPanel('Training results', `<p class="text-red-400 text-sm">${e.message}</p>`);
      } finally {
        hideLoader();
        btn.disabled = false;
        btn.textContent = 'Train all';
      }
    }

    // ─── page loader ────────────────────────────────────────────────
    function showLoader(message) {
      document.getElementById('loader-message').textContent = message;
      document.getElementById('page-loader').classList.remove('hidden');
    }

    function hideLoader() {
      document.getElementById('page-loader').classList.add('hidden');
    }

    // ─── delete asset ───────────────────────────────────────────────
    async function deleteAsset(symbol) {
      if (!confirm(`Delete ${symbol} and all its news and ML models?`)) return;
      showLoader(`Deleting ${symbol}...`);
      try {
        const res = await fetch(`/assets/${symbol}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail ?? 'Error deleting asset.');
        loadAssets();
      } catch (e) {
        alert(e.message);
      } finally {
        hideLoader();
      }
    }

    // ─── create asset modal ─────────────────────────────────────────
    function openCreateModal() {
      document.getElementById('f-name').value = '';
      document.getElementById('f-symbol').value = '';
      document.getElementById('f-yfinance').value = '';
      document.getElementById('f-type').value = 'stock';
      document.getElementById('create-error').classList.add('hidden');
      document.getElementById('create-modal').classList.remove('hidden');
    }

    function closeCreateModal() {
      document.getElementById('create-modal').classList.add('hidden');
    }

    function handleModalBackdrop(e) {
      if (e.target === document.getElementById('create-modal')) closeCreateModal();
    }

    async function submitCreateAsset() {
      const btn = document.getElementById('create-btn');
      const err = document.getElementById('create-error');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Validating...';

      const body = {
        name: document.getElementById('f-name').value.trim(),
        symbol: document.getElementById('f-symbol').value.trim().toUpperCase(),
        yfinance_symbol: document.getElementById('f-yfinance').value.trim(),
        asset_type: document.getElementById('f-type').value,
      };

      if (!body.name || !body.symbol || !body.yfinance_symbol) {
        err.textContent = 'All fields are required.';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create';
        return;
      }

      try {
        closeCreateModal();
        showLoader(`Creating ${body.symbol}...`);
        const res = await fetch('/assets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail ?? 'Error creating asset.');
        loadAssets();
      } catch (e) {
        openCreateModal();
        err.textContent = e.message;
        err.classList.remove('hidden');
      } finally {
        hideLoader();
        btn.disabled = false;
        btn.textContent = 'Create';
      }
    }

    loadAssets();
  </script>
</body>
</html>
